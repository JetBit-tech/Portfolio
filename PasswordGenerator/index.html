<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Password Generator</h1>

        <input type="number" id="length" value="12" min="4" max="64">

        <div>
            <label><input type="checkbox" id="uppercase" checked> Velká písmena</label><br>
            <label><input type="checkbox" id="lowercase" checked> Malá písmena</label><br>
            <label><input type="checkbox" id="numbers" checked> Čísla</label><br>
            <label><input type="checkbox" id="symbols"> Symboly</label>
        </div>

        <button onclick="generatePassword()">Generate</button>

        <input type="text" id="password" readonly>

        <button onclick="copyPassword()">Copy</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
